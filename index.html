<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Tavla Online</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, signInAnonymously, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getDatabase, ref, set, get, update, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
  const firebaseConfig = {
    apiKey: "AIzaSyBsQ_y0PgD_7RhT4jjV-CjwztElWhOxXnA",
    authDomain: "tavla-b0391.firebaseapp.com",
    databaseURL: "https://tavla-b0391-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "tavla-b0391",
    storageBucket: "tavla-b0391.firebasestorage.app",
    messagingSenderId: "1080621564843",
    appId: "1:1080621564843:web:07d45dd5036c158ab9c8ee"
  };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);
  window._fb = { auth, db, ref, set, get, update, onValue, push, remove, signInAnonymously, updateProfile };
  window.dispatchEvent(new Event('firebase-ready'));
</script>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#1a0f00;
  --surface:#2a1a08;
  --surface2:#3a2410;
  --border:#5a3a1a;
  --gold:#d4a843;
  --gold2:#f0c860;
  --red:#c0392b;
  --cream:#f5e6c8;
  --text:#e8d5b0;
  --dim:#8a6a40;
  --white-c:#f0e0c0;
  --black-c:#1a0800;
  --board-bg:#2d1a06;
  --tri-red:#8B2020;
  --tri-cream:#C8A050;
  --bar-bg:#1a0f00;
  --hit-glow:rgba(255,200,0,0.6);
  --valid-glow:rgba(100,220,100,0.5);
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;height:100vh;overflow:hidden;user-select:none;}

/* SCREENS */
.screen{display:none;position:fixed;inset:0;flex-direction:column;}
.screen.active{display:flex;}

/* LOGIN */
#s-login{align-items:center;justify-content:center;background:radial-gradient(ellipse at center, #2a1505 0%, #0d0700 100%);}
.logo{text-align:center;margin-bottom:2rem;}
.logo-icon{font-size:3.5rem;display:block;margin-bottom:.5rem;}
.logo-text{font-family:'Cinzel',serif;font-size:2.5rem;font-weight:900;color:var(--gold);letter-spacing:.15em;}
.logo-sub{font-size:.8rem;color:var(--dim);letter-spacing:.3em;text-transform:uppercase;margin-top:.2rem;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.75rem;width:100%;max-width:340px;box-shadow:0 20px 60px rgba(0,0,0,0.6);}
.card-title{font-family:'Cinzel',serif;font-size:.85rem;color:var(--gold);letter-spacing:.1em;margin-bottom:1.25rem;text-align:center;}
label{display:block;font-size:.75rem;color:var(--dim);margin-bottom:.3rem;letter-spacing:.05em;}
input[type=text]{width:100%;background:#0d0700;border:1px solid var(--border);border-radius:10px;padding:.75rem 1rem;color:var(--text);font-size:1rem;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s;}
input[type=text]:focus{border-color:var(--gold);}
input[type=text]::placeholder{color:var(--dim);}
.btn{display:block;width:100%;padding:.8rem;border:none;border-radius:10px;font-family:'Cinzel',serif;font-size:.85rem;font-weight:700;letter-spacing:.1em;cursor:pointer;transition:all .15s;margin-top:.75rem;}
.btn-gold{background:linear-gradient(135deg,#a07020,var(--gold));color:#0d0700;}
.btn-gold:hover{filter:brightness(1.1);}
.btn-gold:disabled{opacity:.5;cursor:not-allowed;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text);}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);}
.btn-red{background:var(--red);color:#fff;}

/* LOBBY */
#s-lobby{background:var(--bg);}
.lobby-header{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.25rem;border-bottom:1px solid var(--border);}
.lobby-logo{font-family:'Cinzel',serif;font-size:1.2rem;color:var(--gold);}
.user-chip{display:flex;align-items:center;gap:.5rem;font-size:.85rem;color:var(--dim);}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:.9rem;color:var(--gold);}
.lobby-body{flex:1;padding:1.25rem;display:flex;flex-direction:column;gap:1rem;overflow-y:auto;}
.action-cards{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;}
.action-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.25rem;text-align:center;cursor:pointer;transition:all .2s;}
.action-card:active{transform:scale(.97);}
.action-card:hover{border-color:var(--gold);box-shadow:0 4px 20px rgba(212,168,67,.15);}
.ac-icon{font-size:2rem;margin-bottom:.5rem;}
.ac-title{font-family:'Cinzel',serif;font-size:.85rem;color:var(--gold);margin-bottom:.25rem;}
.ac-desc{font-size:.75rem;color:var(--dim);}
.join-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.25rem;}
.join-box-title{font-family:'Cinzel',serif;font-size:.85rem;color:var(--gold);margin-bottom:.75rem;}
.join-row{display:flex;gap:.5rem;}
.join-row input{flex:1;text-transform:uppercase;letter-spacing:.2em;font-size:1.1rem;}
.join-row .btn{width:auto;padding:.75rem 1rem;margin-top:0;flex-shrink:0;}

/* WAITING */
#s-waiting{align-items:center;justify-content:center;background:var(--bg);}
.waiting-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2rem;text-align:center;max-width:320px;width:100%;}
.wc-label{font-size:.75rem;color:var(--dim);letter-spacing:.2em;text-transform:uppercase;}
.room-code{font-family:'Cinzel',serif;font-size:3rem;font-weight:900;color:var(--gold);letter-spacing:.3em;margin:1rem 0;text-shadow:0 0 30px rgba(212,168,67,.4);}
.pulse{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--gold);animation:pulse 1.5s infinite;margin-right:.4rem;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.3;transform:scale(.7);}}

/* GAME */
#s-game{background:#0d0700;}
.game-wrap{display:flex;flex-direction:column;height:100vh;}

/* Player bars */
.pbar{display:flex;align-items:center;justify-content:space-between;padding:.5rem .75rem;background:var(--surface);border-bottom:1px solid var(--border);min-height:48px;}
.pbar.bottom{border-bottom:none;border-top:1px solid var(--border);}
.pbar-left{display:flex;align-items:center;gap:.5rem;}
.pchip{width:16px;height:16px;border-radius:50%;flex-shrink:0;border:2px solid rgba(255,255,255,.15);}
.pchip.w{background:var(--white-c);}
.pchip.b{background:var(--black-c);}
.pname{font-family:'Cinzel',serif;font-size:.85rem;}
.ppip{font-size:.7rem;color:var(--dim);margin-left:.2rem;}
.pbar-right{display:flex;align-items:center;gap:.6rem;}
.timer{font-family:'Cinzel',serif;font-size:1rem;font-weight:700;color:var(--gold);min-width:36px;text-align:right;}
.timer.warn{color:#e67e22;}
.timer.danger{color:var(--red);animation:blink .5s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
.score-badge{font-family:'Cinzel',serif;font-size:.8rem;color:var(--dim);background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:.15rem .4rem;}

/* Board area */
.board-area{flex:1;position:relative;overflow:hidden;}
canvas{display:block;width:100%;height:100%;}

/* Dice & Controls overlay */
.overlay{position:absolute;inset:0;pointer-events:none;}
.dice-row{position:absolute;left:50%;transform:translateX(-50%);display:flex;gap:.4rem;pointer-events:all;}
.dice-row.top{top:8px;}
.dice-row.bot{bottom:8px;}
.die{width:36px;height:36px;background:var(--cream);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;border:2px solid #a08040;box-shadow:0 2px 8px rgba(0,0,0,.5);transition:opacity .3s;}
.die.used{opacity:.25;background:#3a2410;border-color:#5a3a1a;}
.controls{position:absolute;right:8px;bottom:60px;display:flex;flex-direction:column;gap:.4rem;pointer-events:all;}
.cbtn{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.4rem .7rem;font-family:'Cinzel',serif;font-size:.7rem;color:var(--text);cursor:pointer;white-space:nowrap;transition:all .15s;}
.cbtn:hover{border-color:var(--gold);color:var(--gold);}
.cbtn.primary{background:linear-gradient(135deg,#a07020,var(--gold));color:#0d0700;border-color:var(--gold);}
.cbtn:disabled{opacity:.3;cursor:default;}

/* Chat */
.chat{height:130px;background:var(--surface);border-top:1px solid var(--border);display:flex;flex-direction:column;transition:height .2s;}
.chat.collapsed{height:32px;}
.chat-hdr{display:flex;justify-content:space-between;align-items:center;padding:.3rem .75rem;border-bottom:1px solid var(--border);cursor:pointer;flex-shrink:0;}
.chat-hdr span{font-size:.7rem;color:var(--dim);}
.chat-msgs{flex:1;overflow-y:auto;padding:.4rem .75rem;display:flex;flex-direction:column;gap:.2rem;}
.chat-msgs::-webkit-scrollbar{width:3px;}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--border);}
.cmsg{font-size:.8rem;line-height:1.3;}
.cmsg .cn{color:var(--gold);margin-right:.3rem;font-weight:600;}
.cmsg.sys{color:var(--dim);font-style:italic;}
.chat-inp{display:flex;border-top:1px solid var(--border);flex-shrink:0;}
.chat-inp input{flex:1;background:transparent;border:none;padding:.4rem .75rem;color:var(--text);font-size:.85rem;outline:none;}
.chat-inp button{background:none;border:none;border-left:1px solid var(--border);padding:.4rem .6rem;color:var(--dim);cursor:pointer;font-size:.9rem;}
.chat-inp button:hover{color:var(--gold);}

/* Toast */
#toasts{position:fixed;top:.75rem;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:.4rem;pointer-events:none;width:90%;max-width:320px;}
.toast{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.5rem 1rem;font-family:'Cinzel',serif;font-size:.8rem;color:var(--gold);text-align:center;animation:tin .25s ease,tout .3s ease 2.2s forwards;box-shadow:0 4px 16px rgba(0,0,0,.5);}
.toast.err{color:var(--red);border-color:var(--red);}
@keyframes tin{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
@keyframes tout{to{opacity:0;}}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:800;align-items:center;justify-content:center;padding:1.5rem;}
.modal-bg.show{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.75rem;max-width:320px;width:100%;text-align:center;}
.modal h2{font-family:'Cinzel',serif;color:var(--gold);font-size:1.3rem;margin-bottom:.5rem;}
.modal p{color:var(--dim);font-size:.9rem;margin-bottom:1.25rem;}
.modal-btns{display:flex;flex-direction:column;gap:.5rem;}

/* El seçimi */
.el-opts{display:flex;gap:.5rem;justify-content:center;margin-bottom:1rem;}
.el-opt{background:var(--surface2);border:2px solid var(--border);border-radius:10px;padding:.5rem 1rem;font-family:'Cinzel',serif;font-size:.9rem;color:var(--text);cursor:pointer;transition:all .15s;}
.el-opt.selected{border-color:var(--gold);color:var(--gold);background:rgba(212,168,67,.1);}

/* Turn indicator */
.turn-ind{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.85);border:1px solid var(--gold);border-radius:10px;padding:.5rem 1.2rem;font-family:'Cinzel',serif;font-size:.85rem;color:var(--gold);pointer-events:none;transition:opacity .3s;}
</style>
</head>
<body>
<div id="toasts"></div>

<!-- LOGIN -->
<div class="screen active" id="s-login">
  <div class="logo">
    <span class="logo-icon">🎲</span>
    <div class="logo-text">TAVLA</div>
    <div class="logo-sub">Online · Gerçek Zamanlı</div>
  </div>
  <div class="card">
    <div class="card-title">HOŞ GELDİNİZ</div>
    <div style="margin-bottom:1rem;">
      <label>Kullanıcı Adı</label>
      <input type="text" id="inp-name" placeholder="Adınızı girin" maxlength="16" autocomplete="off"/>
    </div>
    <button class="btn btn-gold" id="btn-login" onclick="doLogin()">OYNA</button>
  </div>
</div>

<!-- LOBBY -->
<div class="screen" id="s-lobby">
  <div class="lobby-header">
    <div class="lobby-logo">🎲 TAVLA</div>
    <div class="user-chip">
      <div class="avatar" id="lob-av">?</div>
      <span id="lob-name">—</span>
    </div>
  </div>
  <div class="lobby-body">
    <div class="action-cards">
      <div class="action-card" onclick="doCreate()">
        <div class="ac-icon">🏠</div>
        <div class="ac-title">ODA OLUŞTUR</div>
        <div class="ac-desc">Arkadaşını davet et</div>
      </div>
      <div class="action-card" onclick="toggleJoin()">
        <div class="ac-icon">🚪</div>
        <div class="ac-title">ODA GİR</div>
        <div class="ac-desc">Kod ile katıl</div>
      </div>
    </div>
    <div class="join-box" id="join-box" style="display:none;">
      <div class="join-box-title">Oda Kodunu Gir</div>
      <div class="join-row">
        <input type="text" id="inp-code" placeholder="ABCD" maxlength="4" autocomplete="off"/>
        <button class="btn btn-gold" onclick="doJoin()">GİR</button>
      </div>
    </div>
  </div>
</div>

<!-- WAITING -->
<div class="screen" id="s-waiting">
  <div class="waiting-card">
    <div class="wc-label">Oda Kodu</div>
    <div class="room-code" id="disp-code">----</div>
    <div style="color:var(--dim);margin-bottom:1rem;font-size:.9rem;">
      <span class="pulse"></span>Rakip bekleniyor...
    </div>
    <div style="font-size:.8rem;color:var(--dim);margin-bottom:1.5rem;">Bu kodu arkadaşına gönder</div>
    <button class="btn btn-gold" onclick="copyCode()" style="margin-bottom:.5rem;">📋 Kodu Kopyala</button>
    <button class="btn btn-outline" onclick="cancelWait()">İptal</button>
  </div>
</div>

<!-- GAME -->
<div class="screen" id="s-game">
  <div class="game-wrap">
    <div class="pbar" id="top-bar">
      <div class="pbar-left">
        <div class="pchip" id="top-chip"></div>
        <span class="pname" id="top-name">Rakip</span>
        <span class="ppip" id="top-pip"></span>
      </div>
      <div class="pbar-right">
        <span class="score-badge" id="top-score">0</span>
        <div class="timer" id="top-timer">—</div>
      </div>
    </div>

    <div class="board-area">
      <canvas id="cvs"></canvas>
      <div class="overlay">
        <div class="dice-row top" id="dice-top"></div>
        <div class="dice-row bot" id="dice-bot"></div>
        <div class="turn-ind" id="turn-ind" style="opacity:0;"></div>
        <div class="controls" id="controls">
          <button class="cbtn primary" id="btn-roll" onclick="doRoll()" style="display:none;">🎲 Zar At</button>
          <button class="cbtn" id="btn-end" onclick="doEndTurn()" style="display:none;">✓ Sırayı Bitir</button>
          <button class="cbtn" id="btn-undo" onclick="doUndo()" style="display:none;">↩ Geri Al</button>
          <button class="cbtn" onclick="showMenu()">☰ Menü</button>
        </div>
      </div>
    </div>

    <div class="pbar bottom" id="bot-bar">
      <div class="pbar-left">
        <div class="pchip" id="bot-chip"></div>
        <span class="pname" id="bot-name">Sen</span>
        <span class="ppip" id="bot-pip"></span>
      </div>
      <div class="pbar-right">
        <span class="score-badge" id="bot-score">0</span>
        <div class="timer" id="bot-timer">—</div>
      </div>
    </div>

    <div class="chat" id="chat">
      <div class="chat-hdr" onclick="toggleChat()">
        <span>💬 Sohbet</span>
        <span id="chat-arr">▲</span>
      </div>
      <div class="chat-msgs" id="chat-msgs"></div>
      <div class="chat-inp">
        <input type="text" id="chat-in" placeholder="Mesaj yaz..." maxlength="80" onkeydown="if(event.key==='Enter')sendMsg()"/>
        <button onclick="sendMsg()">▶</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h2 id="m-title"></h2>
    <p id="m-text"></p>
    <div class="modal-btns" id="m-btns"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let fb = null;
let me = null;          // {uid, name}
let roomId = null;
let myColor = null;     // 'w' | 'b'
let gs = null;          // game state
let selected = null;    // selected point index or 'bar'
let validDests = [];    // valid destination points
let undoStack = [];
let timerIv = null;
let gameUnsub = null;
let chatUnsub = null;
let chatOpen = true;
let scores = {w:0, b:0};  // current match scores
let matchTarget = 1;       // 1, 3 or 5

// Canvas
let cvs, ctx, CW, CH;

// ═══════════════════════════════════════════════════════
//  FIREBASE INIT
// ═══════════════════════════════════════════════════════
window.addEventListener('firebase-ready', () => {
  fb = window._fb;
  show('s-login');
});

// ═══════════════════════════════════════════════════════
//  SCREEN MANAGEMENT
// ═══════════════════════════════════════════════════════
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 's-game') initCanvas();
}

// ═══════════════════════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════════════════════
async function doLogin() {
  const name = document.getElementById('inp-name').value.trim();
  if (!name || name.length < 2) { toast('En az 2 karakter girin', true); return; }
  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.textContent = 'Bağlanıyor...';
  try {
    const r = await fb.signInAnonymously(fb.auth);
    await fb.updateProfile(r.user, {displayName: name});
    me = {uid: r.user.uid, name};
    document.getElementById('lob-av').textContent = name[0].toUpperCase();
    document.getElementById('lob-name').textContent = name;
    show('s-lobby');
  } catch(e) {
    let msg = e.message;
    if (e.code === 'auth/operation-not-allowed') msg = 'Anonim giriş kapalı! Firebase Authentication → Anonim seçeneğini aç.';
    toast(msg, true); alert('Hata: ' + msg);
  } finally { btn.disabled = false; btn.textContent = 'OYNA'; }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('s-login').classList.contains('active')) doLogin();
});

// ═══════════════════════════════════════════════════════
//  LOBBY
// ═══════════════════════════════════════════════════════
function toggleJoin() {
  const b = document.getElementById('join-box');
  b.style.display = b.style.display === 'none' ? 'block' : 'none';
}

function rndCode() {
  const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s = '';
  for (let i = 0; i < 4; i++) s += c[Math.floor(Math.random() * c.length)];
  return s;
}

async function doCreate() {
  if (!me) return;
  // Show match target selection first
  showElModal(async (target) => {
    matchTarget = target;
    scores = {w:0, b:0};
    const code = rndCode();
    roomId = code;
    myColor = 'w';
    const data = {
      host: {uid: me.uid, name: me.name},
      guest: null,
      status: 'waiting',
      matchTarget,
      scores: {w:0, b:0},
      gs: freshGS(),
      createdAt: Date.now()
    };
    await fb.set(fb.ref(fb.db, `rooms/${code}`), data);
    document.getElementById('disp-code').textContent = code;
    show('s-waiting');
    waitForGuest(code);
  });
}

function showElModal(cb) {
  let chosen = 1;
  const overlay = document.getElementById('modal');
  document.getElementById('m-title').textContent = 'Kaç El?';
  document.getElementById('m-text').textContent = 'Maç kaç el üzerinden oynanacak?';
  document.getElementById('m-btns').innerHTML = `
    <div class="el-opts">
      <div class="el-opt selected" data-v="1" onclick="selEl(this)">1 El</div>
      <div class="el-opt" data-v="3" onclick="selEl(this)">3 El</div>
      <div class="el-opt" data-v="5" onclick="selEl(this)">5 El</div>
    </div>
    <button class="btn btn-gold" onclick="confirmEl()">BAŞLA</button>
  `;
  window._elCb = cb;
  window._elChosen = 1;
  overlay.classList.add('show');
}

function selEl(el) {
  document.querySelectorAll('.el-opt').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  window._elChosen = parseInt(el.dataset.v);
}

function confirmEl() {
  document.getElementById('modal').classList.remove('show');
  if (window._elCb) window._elCb(window._elChosen);
}

function waitForGuest(code) {
  const ref = fb.ref(fb.db, `rooms/${code}`);
  const unsub = fb.onValue(ref, snap => {
    const d = snap.val();
    if (d && d.guest && d.status === 'playing') {
      unsub();
      matchTarget = d.matchTarget || 1;
      scores = d.scores || {w:0, b:0};
      startGame(d);
    }
  });
}

async function doJoin() {
  const code = document.getElementById('inp-code').value.trim().toUpperCase();
  if (code.length !== 4) { toast('4 haneli kod girin', true); return; }
  try {
    const snap = await fb.get(fb.ref(fb.db, `rooms/${code}`));
    if (!snap.exists()) { toast('Oda bulunamadı', true); return; }
    const d = snap.val();
    if (d.status !== 'waiting') { toast('Oda dolu veya oyun başlamış', true); return; }
    if (d.host.uid === me.uid) { toast('Kendi odanıza giremezsiniz', true); return; }

    roomId = code;
    myColor = 'b';
    matchTarget = d.matchTarget || 1;
    scores = d.scores || {w:0, b:0};

    // Determine first turn by dice
    const d1 = Math.ceil(Math.random()*6), d2 = Math.ceil(Math.random()*6);
    const firstTurn = d1 >= d2 ? 'w' : 'b';
    const newGs = {...freshGS(), phase:'rolling', turn:firstTurn, turnStart:Date.now()};

    await fb.update(fb.ref(fb.db, `rooms/${code}`), {
      guest: {uid: me.uid, name: me.name},
      status: 'playing',
      gs: newGs
    });

    const snap2 = await fb.get(fb.ref(fb.db, `rooms/${code}`));
    startGame(snap2.val());
  } catch(e) { toast('Hata: ' + e.message, true); }
}

function copyCode() {
  navigator.clipboard.writeText(roomId||'').then(() => toast('Kod kopyalandı!'));
}

async function cancelWait() {
  if (roomId) await fb.remove(fb.ref(fb.db, `rooms/${roomId}`));
  roomId = null;
  show('s-lobby');
}

// ═══════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════
function freshGS() {
  // Points 1-24. White moves 1→24 (home: 19-24), Black moves 24→1 (home: 1-6)
  // points[i] = {c:'w'|'b'|null, n:count}
  const pts = [];
  for (let i = 0; i < 26; i++) pts.push({c:null, n:0});

  // Standard setup
  pts[1]  = {c:'w', n:2};
  pts[6]  = {c:'b', n:5};
  pts[8]  = {c:'b', n:3};
  pts[12] = {c:'w', n:5};
  pts[13] = {c:'b', n:5};
  pts[17] = {c:'w', n:3};
  pts[19] = {c:'w', n:5};
  pts[24] = {c:'b', n:2};

  return {
    pts,
    bar: {w:0, b:0},
    off: {w:0, b:0},
    turn: null,
    phase: 'waiting', // waiting|rolling|moving|gameover
    dice: [],
    used: [],
    winner: null,
    turnStart: null
  };
}

// ═══════════════════════════════════════════════════════
//  GAME START
// ═══════════════════════════════════════════════════════
function startGame(room) {
  gs = room.gs;
  if (!gs.pts) gs = freshGS();
  // Ensure pts array
  if (!Array.isArray(gs.pts)) gs.pts = Object.values(gs.pts);

  const isHost = room.host.uid === me.uid;
  const oppName = isHost ? room.guest?.name : room.host?.name;

  const topColor = myColor === 'w' ? 'b' : 'w';
  document.getElementById('top-chip').className = 'pchip ' + topColor;
  document.getElementById('bot-chip').className = 'pchip ' + myColor;
  document.getElementById('top-name').textContent = oppName || 'Rakip';
  document.getElementById('bot-name').textContent = me.name;

  updateScoreDisplay();
  show('s-game');

  // Listen game state
  if (gameUnsub) gameUnsub();
  gameUnsub = fb.onValue(fb.ref(fb.db, `rooms/${roomId}/gs`), snap => {
    if (!snap.exists()) return;
    gs = snap.val();
    if (!Array.isArray(gs.pts)) gs.pts = Object.values(gs.pts);
    selected = null; validDests = [];
    render();
    updateHUD();
    if (gs.phase === 'gameover') onGameOver(gs.winner);
  });

  // Listen scores
  fb.onValue(fb.ref(fb.db, `rooms/${roomId}/scores`), snap => {
    if (snap.exists()) { scores = snap.val(); updateScoreDisplay(); }
  });

  listenChat();
  sysMsg('Oyun başladı! 🎲');
  render();
  updateHUD();
}

// ═══════════════════════════════════════════════════════
//  CANVAS INIT & RENDER
// ═══════════════════════════════════════════════════════
function initCanvas() {
  cvs = document.getElementById('cvs');
  ctx = cvs.getContext('2d');
  resizeCvs();
  cvs.addEventListener('click', onBoardClick);
  window.addEventListener('resize', () => { resizeCvs(); render(); });
}

function resizeCvs() {
  const area = document.querySelector('.board-area');
  CW = area.clientWidth;
  CH = area.clientHeight;
  cvs.width = CW;
  cvs.height = CH;
}

// Layout constants (computed from CW/CH)
function layout() {
  const margin = 6;
  const barW = Math.max(20, CW * 0.06);
  const boardW = CW - margin * 2;
  const halfW = (boardW - barW) / 2;
  const ptW = halfW / 6;
  const ptH = Math.min(CH * 0.42, ptW * 4.5);
  const checkerR = Math.min(ptW * 0.42, 18);
  return {margin, barW, boardW, halfW, ptW, ptH, checkerR,
    boardH: CH,
    leftX: margin,                          // left board left edge
    barX: margin + halfW,                   // bar left edge
    rightX: margin + halfW + barW,          // right board left edge
    topY: margin + 2,
    botY: CH - margin - 2
  };
}

function ptX(i, L) {
  // Returns center-x of point i (1-24)
  // Bottom: 1(rightmost right) → 6(leftmost right) → 7(rightmost left) → 12(leftmost left)
  // Top:   24(rightmost right) → 19(leftmost right) → 18(rightmost left) → 13(leftmost left)
  if (i >= 1 && i <= 6) {
    // bottom right, rightmost = 1
    return L.rightX + (6 - i + 0.5) * L.ptW;
  } else if (i >= 7 && i <= 12) {
    // bottom left, i=7 rightmost of left
    return L.leftX + (12 - i + 0.5) * L.ptW;
  } else if (i >= 13 && i <= 18) {
    // top left, i=13 leftmost
    return L.leftX + (i - 13 + 0.5) * L.ptW;
  } else {
    // top right, i=19 leftmost of right, i=24 rightmost
    return L.rightX + (i - 19 + 0.5) * L.ptW;
  }
}

function ptIsTop(i) { return i >= 13 && i <= 24; }

function render() {
  if (!cvs || !ctx || !gs) return;
  ctx.clearRect(0, 0, CW, CH);
  const L = layout();

  drawBoard(L);
  drawPoints(L);
  drawCheckers(L);
  drawBarCheckers(L);
  drawBorneOff(L);
  drawHighlights(L);
  updateDiceDisplay();
}

function drawBoard(L) {
  // Board background
  ctx.fillStyle = '#1e0f04';
  roundRect(ctx, L.leftX, 0, L.boardW, CH, 8);
  ctx.fill();

  // Bar
  ctx.fillStyle = '#0f0700';
  ctx.fillRect(L.barX, 0, L.barW, CH);

  // Border
  ctx.strokeStyle = 'rgba(212,168,67,0.3)';
  ctx.lineWidth = 1.5;
  roundRect(ctx, L.leftX, 2, L.boardW, CH-4, 8);
  ctx.stroke();

  // Middle line
  ctx.strokeStyle = 'rgba(90,58,26,0.4)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(L.leftX, CH/2);
  ctx.lineTo(L.barX, CH/2);
  ctx.moveTo(L.rightX, CH/2);
  ctx.lineTo(L.leftX + L.boardW, CH/2);
  ctx.stroke();
}

function drawPoints(L) {
  for (let i = 1; i <= 24; i++) {
    const isTop = ptIsTop(i);
    const cx = ptX(i, L);
    const color = i % 2 === 0 ? '#8B2020' : '#C8A050';
    const tipY = isTop ? L.topY + L.ptH : L.botY - L.ptH;
    const baseY = isTop ? L.topY : L.botY;

    ctx.beginPath();
    ctx.moveTo(cx - L.ptW * 0.48, baseY);
    ctx.lineTo(cx + L.ptW * 0.48, baseY);
    ctx.lineTo(cx, tipY);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.75;
    ctx.fill();
    ctx.globalAlpha = 1;

    // Point number
    const numY = isTop ? baseY - 8 : baseY + 8;
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.font = `${Math.max(7, L.ptW * 0.28)}px Inter`;
    ctx.textAlign = 'center';
    ctx.textBaseline = isTop ? 'bottom' : 'top';
    ctx.fillText(i, cx, numY);
  }
  ctx.textBaseline = 'middle';
}

function drawCheckers(L) {
  if (!gs || !gs.pts) return;
  for (let i = 1; i <= 24; i++) {
    const pt = gs.pts[i];
    if (!pt || pt.n === 0) continue;
    const cx = ptX(i, L);
    const isTop = ptIsTop(i);
    drawStack(cx, isTop ? L.topY : L.botY, pt.n, pt.c, isTop, L.checkerR, false, i);
  }
}

function drawStack(cx, startY, count, color, goDown, r, isBar, ptIdx) {
  const dir = goDown ? 1 : -1;
  const maxShow = Math.floor((CH * 0.38) / (r * 1.85));
  const show = Math.min(count, maxShow);
  const wColor = color === 'w';

  for (let k = 0; k < show; k++) {
    const cy = startY + dir * (r + k * r * 1.85);
    drawChecker(cx, cy, r, wColor);
  }

  if (count > show) {
    const lastCy = startY + dir * (r + (show-1) * r * 1.85);
    ctx.fillStyle = wColor ? '#3a2010' : '#f0e0c0';
    ctx.font = `bold ${Math.max(8, r * 0.8)}px Cinzel, serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(count, cx, lastCy);
  }
}

function drawChecker(cx, cy, r, isWhite) {
  // Shadow
  ctx.beginPath();
  ctx.arc(cx + 1, cy + 2, r, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fill();

  // Main body
  const grad = ctx.createRadialGradient(cx - r*0.3, cy - r*0.3, r*0.1, cx, cy, r);
  if (isWhite) {
    grad.addColorStop(0, '#fff8ec');
    grad.addColorStop(0.6, '#e8d0a0');
    grad.addColorStop(1, '#b89060');
  } else {
    grad.addColorStop(0, '#4a2810');
    grad.addColorStop(0.6, '#1e0e04');
    grad.addColorStop(1, '#0a0400');
  }
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.fillStyle = grad;
  ctx.fill();

  // Border
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.strokeStyle = isWhite ? '#c8a060' : '#5a3010';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Inner ring
  ctx.beginPath();
  ctx.arc(cx, cy, r * 0.55, 0, Math.PI*2);
  ctx.strokeStyle = isWhite ? 'rgba(180,130,60,0.5)' : 'rgba(180,120,40,0.3)';
  ctx.lineWidth = 1;
  ctx.stroke();
}

function drawBarCheckers(L) {
  if (!gs) return;
  const barCx = L.barX + L.barW / 2;
  const r = L.checkerR * 0.9;

  // White bar checkers (shown at bottom of bar)
  if (gs.bar.w > 0) {
    const cnt = gs.bar.w;
    for (let k = 0; k < Math.min(cnt, 4); k++) {
      const cy = CH/2 + (k+0.5) * r * 2.1 + 2;
      drawChecker(barCx, cy, r, true);
    }
    if (cnt > 1) {
      ctx.fillStyle = 'rgba(212,168,67,0.9)';
      ctx.font = `bold ${r * 0.85}px Cinzel, serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(cnt, barCx, CH/2 + r * 1.1);
    }
  }

  // Black bar checkers (shown at top of bar)
  if (gs.bar.b > 0) {
    const cnt = gs.bar.b;
    for (let k = 0; k < Math.min(cnt, 4); k++) {
      const cy = CH/2 - (k+0.5) * r * 2.1 - 2;
      drawChecker(barCx, cy, r, false);
    }
    if (cnt > 1) {
      ctx.fillStyle = 'rgba(212,168,67,0.9)';
      ctx.font = `bold ${r * 0.85}px Cinzel, serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(cnt, barCx, CH/2 - r * 1.1);
    }
  }
}

function drawBorneOff(L) {
  if (!gs) return;
  const r = L.checkerR * 0.6;
  const spacing = r * 1.4;

  // White borne off — right edge bottom
  const wo = gs.off.w || 0;
  if (wo > 0) {
    for (let k = 0; k < Math.min(wo, 15); k++) {
      const cy = CH - L.margin - r - k * spacing;
      drawChecker(CW - 4, cy, r, true);
    }
    ctx.fillStyle = 'rgba(212,168,67,0.7)';
    ctx.font = `bold ${r * 1.1}px Cinzel`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(wo, CW - 4, CH - L.margin - r - wo * spacing - r);
  }

  // Black borne off — right edge top
  const bo = gs.off.b || 0;
  if (bo > 0) {
    for (let k = 0; k < Math.min(bo, 15); k++) {
      const cy = L.margin + r + k * spacing;
      drawChecker(CW - 4, cy, r, false);
    }
    ctx.fillStyle = 'rgba(212,168,67,0.7)';
    ctx.font = `bold ${r * 1.1}px Cinzel`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(bo, CW - 4, L.margin + r + bo * spacing + r);
  }
}

function drawHighlights(L) {
  if (!gs || !isMyTurn()) return;

  // Selected point highlight
  if (selected !== null) {
    if (selected !== 'bar') {
      const cx = ptX(selected, L);
      const isTop = ptIsTop(selected);
      const baseY = isTop ? L.topY : L.botY;
      ctx.beginPath();
      ctx.arc(cx, baseY + (isTop ? L.ptH * 0.15 : -L.ptH * 0.15), L.ptW * 0.45, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(212,168,67,0.3)';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cx, baseY + (isTop ? L.ptH * 0.15 : -L.ptH * 0.15), L.ptW * 0.45, 0, Math.PI*2);
      ctx.strokeStyle = 'rgba(212,168,67,0.8)';
      ctx.lineWidth = 2;
      ctx.stroke();
    } else {
      // Highlight bar
      const barCx = L.barX + L.barW/2;
      const barCy = myColor === 'w' ? CH*0.65 : CH*0.35;
      ctx.beginPath();
      ctx.arc(barCx, barCy, L.checkerR * 1.2, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(212,168,67,0.3)';
      ctx.fill();
    }
  }

  // Valid destinations
  for (const dest of validDests) {
    if (dest === 'off') {
      // Show off zone
      const offX = CW - 8;
      const offY = myColor === 'w' ? CH * 0.75 : CH * 0.25;
      ctx.beginPath();
      ctx.arc(offX, offY, L.checkerR * 0.9, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(80,220,80,0.4)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(80,220,80,0.8)';
      ctx.lineWidth = 2;
      ctx.stroke();
      continue;
    }
    const cx = ptX(dest, L);
    const isTop = ptIsTop(dest);
    const baseY = isTop ? L.topY : L.botY;
    const dotY = baseY + (isTop ? L.ptH*0.08 : -L.ptH*0.08);

    // Green dot
    ctx.beginPath();
    ctx.arc(cx, dotY, L.checkerR * 0.55, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(80,220,80,0.45)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(80,220,80,0.9)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // If blot (can hit)
    const pt = gs.pts[dest];
    if (pt && pt.c && pt.c !== myColor && pt.n === 1) {
      ctx.beginPath();
      ctx.arc(cx, dotY, L.checkerR * 0.7, 0, Math.PI*2);
      ctx.strokeStyle = 'rgba(255,100,50,0.9)';
      ctx.lineWidth = 2.5;
      ctx.stroke();
    }
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

// ═══════════════════════════════════════════════════════
//  BOARD CLICK
// ═══════════════════════════════════════════════════════
function onBoardClick(e) {
  if (!gs || !isMyTurn() || gs.phase !== 'moving') return;
  const rect = cvs.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (CW / rect.width);
  const my2 = (e.clientY - rect.top) * (CH / rect.height);
  const L = layout();

  // Check if clicking off zone
  if (validDests.includes('off') && mx > CW - 20) {
    doMove(selected, 'off');
    return;
  }

  // Check bar click
  const barCx = L.barX + L.barW/2;
  if (Math.abs(mx - barCx) < L.barW) {
    if (selected !== null && validDests.includes('bar')) {
      // shouldn't happen but guard
    }
    if (gs.bar[myColor] > 0) {
      if (selected === 'bar') {
        selected = null; validDests = []; render(); return;
      }
      selected = 'bar';
      validDests = getValidDests('bar', gs);
      render(); return;
    }
    return;
  }

  // Find which point was clicked
  let clicked = null;
  for (let i = 1; i <= 24; i++) {
    const cx = ptX(i, L);
    if (Math.abs(mx - cx) < L.ptW * 0.55) {
      const isTop = ptIsTop(i);
      const baseY = isTop ? L.topY : L.botY;
      const tipY = isTop ? L.topY + L.ptH : L.botY - L.ptH;
      if (isTop && my2 >= baseY && my2 <= baseY + L.ptH * 1.1) { clicked = i; break; }
      if (!isTop && my2 <= baseY && my2 >= baseY - L.ptH * 1.1) { clicked = i; break; }
    }
  }

  if (clicked === null) { selected = null; validDests = []; render(); return; }

  // If clicking a valid destination
  if (selected !== null && validDests.includes(clicked)) {
    doMove(selected, clicked);
    return;
  }

  // Select own checker
  const pt = gs.pts[clicked];
  if (pt && pt.c === myColor && pt.n > 0) {
    if (gs.bar[myColor] > 0) { toast('Önce bardaki taşını oyna!', true); return; }
    if (selected === clicked) { selected = null; validDests = []; render(); return; }
    selected = clicked;
    validDests = getValidDests(clicked, gs);
    if (validDests.length === 0) toast('Bu taş için hamle yok');
    render();
    return;
  }

  selected = null; validDests = []; render();
}

// ═══════════════════════════════════════════════════════
//  GAME LOGIC — VALID MOVES
// ═══════════════════════════════════════════════════════
function remDice(g) {
  const used = [...(g.used || [])];
  const rem = [...(g.dice || [])];
  const res = [];
  for (const d of rem) {
    const idx = used.indexOf(d);
    if (idx !== -1) { used.splice(idx, 1); }
    else res.push(d);
  }
  return res;
}

function getValidDests(from, g) {
  const color = g.turn;
  const dir = color === 'w' ? 1 : -1;
  const dice = remDice(g);
  const uniq = [...new Set(dice)];
  const dests = new Set();

  if (from === 'bar') {
    for (const d of uniq) {
      const to = color === 'w' ? d : 25 - d;
      if (to < 1 || to > 24) continue;
      const tgt = g.pts[to];
      if (!tgt || tgt.n === 0 || tgt.c === color || tgt.n === 1) dests.add(to);
    }
    return [...dests];
  }

  // Check bearing off possibility
  const canBear = canBearOff(color, g);

  for (const d of uniq) {
    const to = from + dir * d;
    if (to < 1 || to > 24) {
      if (canBear) {
        if (color === 'w' && to === 25) { dests.add('off'); continue; }
        if (color === 'b' && to === 0) { dests.add('off'); continue; }
        // Overshoot — only valid if no checkers on higher points
        if (color === 'w' && to > 25 && noHigherChecker('w', from, g)) dests.add('off');
        if (color === 'b' && to < 0 && noHigherChecker('b', from, g)) dests.add('off');
      }
      continue;
    }
    const tgt = g.pts[to];
    if (!tgt || tgt.n === 0 || tgt.c === color || tgt.n === 1) dests.add(to);
  }
  return [...dests];
}

function canBearOff(color, g) {
  if (g.bar[color] > 0) return false;
  const homeStart = color === 'w' ? 19 : 1;
  const homeEnd = color === 'w' ? 24 : 6;
  for (let i = 1; i <= 24; i++) {
    if (i >= homeStart && i <= homeEnd) continue;
    const pt = g.pts[i];
    if (pt && pt.c === color && pt.n > 0) return false;
  }
  return true;
}

function noHigherChecker(color, from, g) {
  // No checkers on points further from home than 'from'
  if (color === 'w') {
    for (let i = from + 1; i <= 24; i++) {
      const pt = g.pts[i]; if (pt && pt.c === 'w' && pt.n > 0) return false;
    }
  } else {
    for (let i = from - 1; i >= 1; i--) {
      const pt = g.pts[i]; if (pt && pt.c === 'b' && pt.n > 0) return false;
    }
  }
  return true;
}

function getDieForMove(from, to, g) {
  const color = g.turn;
  const dir = color === 'w' ? 1 : -1;
  const dice = remDice(g);

  if (to === 'off') {
    const neededExact = color === 'w' ? 25 - from : from;
    if (dice.includes(neededExact)) return neededExact;
    // Overshoot: use smallest die that gets past
    const overshoots = dice.filter(d => (color === 'w' ? from + d > 24 : from - d < 1));
    if (overshoots.length > 0) return Math.min(...overshoots);
    return null;
  }

  if (from === 'bar') {
    const d = color === 'w' ? to : 25 - to;
    return dice.includes(d) ? d : null;
  }

  const d = Math.abs(to - from);
  return dice.includes(d) ? d : null;
}

// ═══════════════════════════════════════════════════════
//  GAME LOGIC — MAKE MOVE
// ═══════════════════════════════════════════════════════
async function doMove(from, to) {
  if (!isMyTurn() || gs.phase !== 'moving') return;

  const die = getDieForMove(from, to, gs);
  if (die === null) { toast('Geçersiz hamle', true); return; }

  // Save for undo
  undoStack.push(JSON.parse(JSON.stringify(gs)));

  const g = JSON.parse(JSON.stringify(gs));
  const color = g.turn;
  const opp = color === 'w' ? 'b' : 'w';

  // Remove from source
  if (from === 'bar') {
    g.bar[color]--;
  } else {
    g.pts[from].n--;
    if (g.pts[from].n === 0) g.pts[from] = {c: null, n: 0};
  }

  if (to === 'off') {
    g.off[color] = (g.off[color] || 0) + 1;
  } else {
    const tgt = g.pts[to];
    if (tgt && tgt.c === opp && tgt.n === 1) {
      // Hit blot!
      g.bar[opp] = (g.bar[opp] || 0) + 1;
      g.pts[to] = {c: null, n: 0};
      sysMsg(`${color === myColor ? 'Sen' : 'Rakip'} vurdu! 💥`);
    }
    if (!g.pts[to] || g.pts[to].n === 0) {
      g.pts[to] = {c: color, n: 1};
    } else {
      g.pts[to].n++;
    }
  }

  // Mark die as used
  g.used = [...(g.used || []), die];

  // Check win
  if ((g.off[color] || 0) >= 15) {
    g.phase = 'gameover';
    g.winner = color;
    await fb.update(fb.ref(fb.db, `rooms/${roomId}/gs`), g);
    return;
  }

  // Check if any moves remain
  const rem = remDice(g);
  if (rem.length === 0 || !hasAnyMove(color, g)) {
    // End turn
    g.phase = 'rolling';
    g.turn = opp;
    g.dice = [];
    g.used = [];
    g.turnStart = Date.now();
  }

  await fb.update(fb.ref(fb.db, `rooms/${roomId}/gs`), g);
  selected = null; validDests = [];
}

function hasAnyMove(color, g) {
  const rem = remDice(g);
  if (rem.length === 0) return false;

  if (g.bar[color] > 0) {
    return getValidDests('bar', g).length > 0;
  }

  for (let i = 1; i <= 24; i++) {
    const pt = g.pts[i];
    if (pt && pt.c === color && pt.n > 0) {
      if (getValidDests(i, g).length > 0) return true;
    }
  }
  return false;
}

// ═══════════════════════════════════════════════════════
//  ROLL, END TURN, UNDO
// ═══════════════════════════════════════════════════════
async function doRoll() {
  if (!isMyTurn() || gs.phase !== 'rolling') return;
  let d1 = Math.ceil(Math.random()*6);
  let d2 = Math.ceil(Math.random()*6);
  const dice = d1 === d2 ? [d1,d1,d1,d1] : [d1,d2];
  undoStack = [];

  const update = {dice, used: [], phase: 'moving', turnStart: Date.now()};

  // Check if any moves possible
  const tempGs = {...gs, ...update};
  if (!hasAnyMove(gs.turn, tempGs)) {
    // No moves — skip turn
    toast('Hamle yok, sıra geçti');
    update.phase = 'rolling';
    update.turn = gs.turn === 'w' ? 'b' : 'w';
    update.dice = [];
    update.used = [];
  }

  await fb.update(fb.ref(fb.db, `rooms/${roomId}/gs`), update);
  toast(`Zar: ${dice.join(' · ')}`);
}

async function doEndTurn() {
  if (!isMyTurn()) return;
  const opp = gs.turn === 'w' ? 'b' : 'w';
  await fb.update(fb.ref(fb.db, `rooms/${roomId}/gs`), {
    phase: 'rolling', turn: opp, dice: [], used: [], turnStart: Date.now()
  });
  selected = null; validDests = []; undoStack = [];
}

async function doUndo() {
  if (!isMyTurn() || undoStack.length === 0) return;
  const prev = undoStack.pop();
  await fb.update(fb.ref(fb.db, `rooms/${roomId}/gs`), prev);
  selected = null; validDests = [];
}

// ═══════════════════════════════════════════════════════
//  HUD
// ═══════════════════════════════════════════════════════
function isMyTurn() { return gs && gs.turn === myColor && gs.phase !== 'gameover'; }

function updateHUD() {
  if (!gs) return;

  document.getElementById('btn-roll').style.display = (isMyTurn() && gs.phase === 'rolling') ? 'block' : 'none';
  document.getElementById('btn-end').style.display = (isMyTurn() && gs.phase === 'moving') ? 'block' : 'none';
  document.getElementById('btn-undo').style.display = (isMyTurn() && undoStack.length > 0) ? 'block' : 'none';

  // Pip counts
  const myPip = calcPip(myColor, gs);
  const oppColor = myColor === 'w' ? 'b' : 'w';
  const oppPip = calcPip(oppColor, gs);
  document.getElementById('bot-pip').textContent = myPip + ' pip';
  document.getElementById('top-pip').textContent = oppPip + ' pip';

  // Turn indicator
  const ind = document.getElementById('turn-ind');
  if (gs.phase === 'gameover') {
    ind.style.opacity = '0';
  } else {
    const whosTurn = gs.turn === myColor ? 'Senin sıran' : 'Rakibin sırası';
    ind.textContent = whosTurn;
    ind.style.opacity = '1';
    setTimeout(() => { if (ind) ind.style.opacity = '0'; }, 1500);
  }

  updateTimers();
}

function calcPip(color, g) {
  let pip = 0;
  pip += (g.bar[color] || 0) * 25;
  for (let i = 1; i <= 24; i++) {
    const pt = g.pts[i];
    if (pt && pt.c === color && pt.n > 0) {
      pip += pt.n * (color === 'w' ? 25 - i : i);
    }
  }
  return pip;
}

function updateTimers() {
  clearInterval(timerIv);
  if (!gs || gs.phase === 'gameover') return;
  const LIMIT = 60;

  function tick() {
    if (!gs || !gs.turnStart) return;
    const rem = Math.max(0, LIMIT - Math.floor((Date.now() - gs.turnStart) / 1000));
    const myT = gs.turn === myColor;
    const myEl = document.getElementById('bot-timer');
    const oppEl = document.getElementById('top-timer');

    if (myT) {
      myEl.textContent = rem + 's';
      myEl.className = 'timer' + (rem <= 10 ? ' danger' : rem <= 20 ? ' warn' : '');
      oppEl.textContent = '—'; oppEl.className = 'timer';
      if (rem <= 0) doEndTurn();
    } else {
      oppEl.textContent = rem + 's';
      oppEl.className = 'timer' + (rem <= 10 ? ' danger' : rem <= 20 ? ' warn' : '');
      myEl.textContent = '—'; myEl.className = 'timer';
    }
  }

  tick();
  timerIv = setInterval(tick, 1000);
}

function updateDiceDisplay() {
  if (!gs) return;
  const dice = gs.dice || [];
  const used = gs.used || [];
  const faces = ['⚀','⚁','⚂','⚃','⚄','⚅'];

  const rem = [...dice];
  const usedCopy = [...used];
  const isUsed = dice.map(d => {
    const idx = usedCopy.indexOf(d);
    if (idx !== -1) { usedCopy.splice(idx, 1); return true; }
    return false;
  });

  const topEl = document.getElementById('dice-top');
  const botEl = document.getElementById('dice-bot');

  const myTurn = gs.turn === myColor;
  const html = dice.map((d,i) =>
    `<div class="die${isUsed[i] ? ' used' : ''}">${faces[d-1]}</div>`
  ).join('');

  if (myTurn) { botEl.innerHTML = html; topEl.innerHTML = ''; }
  else { topEl.innerHTML = html; botEl.innerHTML = ''; }
}

function updateScoreDisplay() {
  document.getElementById('bot-score').textContent = (scores[myColor] || 0) + '/' + matchTarget;
  const oppColor = myColor === 'w' ? 'b' : 'w';
  document.getElementById('top-score').textContent = (scores[oppColor] || 0) + '/' + matchTarget;
}

// ═══════════════════════════════════════════════════════
//  GAME OVER
// ═══════════════════════════════════════════════════════
async function onGameOver(winner) {
  clearInterval(timerIv);
  if (gameUnsub) { gameUnsub(); gameUnsub = null; }

  const iWon = winner === myColor;

  // Update scores
  scores[winner] = (scores[winner] || 0) + 1;
  await fb.update(fb.ref(fb.db, `rooms/${roomId}/scores`), scores);
  updateScoreDisplay();

  const matchOver = scores[winner] >= matchTarget;

  if (matchOver) {
    showModal(
      iWon ? '🏆 Maçı Kazandın!' : '😔 Maçı Kaybettin',
      `Skor: ${scores['w']} - ${scores['b']}`,
      [
        {text: 'Lobiye Dön', fn: () => { hideModal(); show('s-lobby'); roomId = null; }},
      ]
    );
  } else {
    showModal(
      iWon ? '✓ El Kazandın!' : '✗ El Kaybettin',
      `Skor: ${scores['w']} - ${scores['b']} (${matchTarget} el)`,
      [
        {text: 'Sonraki El', fn: () => { hideModal(); startNextHand(); }},
        {text: 'Çık', fn: () => { hideModal(); show('s-lobby'); roomId = null; }},
      ]
    );
  }
}

async function startNextHand() {
  // Only host resets the game state
  const snap = await fb.get(fb.ref(fb.db, `rooms/${roomId}`));
  const room = snap.val();
  if (!room) return;

  const isHost = room.host.uid === me.uid;
  if (!isHost) {
    // Guest waits for host to reset
    toast('El sıfırlanıyor...');
    return;
  }

  const d1 = Math.ceil(Math.random()*6), d2 = Math.ceil(Math.random()*6);
  const firstTurn = d1 >= d2 ? 'w' : 'b';
  const newGs = {...freshGS(), phase:'rolling', turn:firstTurn, turnStart:Date.now()};
  await fb.update(fb.ref(fb.db, `rooms/${roomId}`), {gs: newGs});

  // Re-attach listener
  undoStack = []; selected = null; validDests = [];
  gameUnsub = fb.onValue(fb.ref(fb.db, `rooms/${roomId}/gs`), snap => {
    if (!snap.exists()) return;
    gs = snap.val();
    if (!Array.isArray(gs.pts)) gs.pts = Object.values(gs.pts);
    selected = null; validDests = [];
    render(); updateHUD();
    if (gs.phase === 'gameover') onGameOver(gs.winner);
  });

  toast('Yeni el başladı!');
}

// ═══════════════════════════════════════════════════════
//  CHAT
// ═══════════════════════════════════════════════════════
function listenChat() {
  if (chatUnsub) chatUnsub();
  chatUnsub = fb.onValue(fb.ref(fb.db, `rooms/${roomId}/chat`), snap => {
    const data = snap.val();
    const el = document.getElementById('chat-msgs');
    el.innerHTML = '';
    if (!data) return;
    Object.values(data).sort((a,b) => a.ts - b.ts).forEach(m => {
      const d = document.createElement('div');
      d.className = 'cmsg' + (m.sys ? ' sys' : '');
      if (!m.sys) d.innerHTML = `<span class="cn">${esc(m.name)}:</span>${esc(m.text)}`;
      else d.textContent = m.text;
      el.appendChild(d);
    });
    el.scrollTop = el.scrollHeight;
  });
}

async function sendMsg() {
  const inp = document.getElementById('chat-in');
  const txt = inp.value.trim();
  if (!txt || !roomId) return;
  inp.value = '';
  await fb.push(fb.ref(fb.db, `rooms/${roomId}/chat`), {
    name: me.name, text: txt, uid: me.uid, ts: Date.now(), sys: false
  });
}

async function sysMsg(text) {
  if (!roomId) return;
  await fb.push(fb.ref(fb.db, `rooms/${roomId}/chat`), {text, ts: Date.now(), sys: true});
}

function toggleChat() {
  const c = document.getElementById('chat');
  chatOpen = !chatOpen;
  c.classList.toggle('collapsed', !chatOpen);
  document.getElementById('chat-arr').textContent = chatOpen ? '▲' : '▼';
}

// ═══════════════════════════════════════════════════════
//  MENU
// ═══════════════════════════════════════════════════════
function showMenu() {
  showModal('Menü', '', [
    {text: 'Lobiye Dön', fn: () => { hideModal(); show('s-lobby'); }},
    {text: 'İptal', fn: hideModal}
  ]);
}

// ═══════════════════════════════════════════════════════
//  MODAL & TOAST
// ═══════════════════════════════════════════════════════
function showModal(title, text, btns) {
  document.getElementById('m-title').textContent = title;
  document.getElementById('m-text').textContent = text;
  const c = document.getElementById('m-btns');
  c.innerHTML = '';
  btns.forEach((b, i) => {
    const btn = document.createElement('button');
    btn.className = 'btn ' + (i === 0 ? 'btn-gold' : 'btn-outline');
    btn.textContent = b.text;
    btn.onclick = b.fn;
    c.appendChild(btn);
  });
  document.getElementById('modal').classList.add('show');
}

function hideModal() { document.getElementById('modal').classList.remove('show'); }

function toast(msg, err = false) {
  const t = document.createElement('div');
  t.className = 'toast' + (err ? ' err' : '');
  t.textContent = msg;
  document.getElementById('toasts').appendChild(t);
  setTimeout(() => t.remove(), 2800);
}

// ═══════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
